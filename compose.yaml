services:
  app:
    image: lihaozhe013/tradeflow-core:latest
    container_name: tradeflow-core-prod
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - /opt/tradeflow/data:/app/data
    environment:
      - NODE_ENV=production
